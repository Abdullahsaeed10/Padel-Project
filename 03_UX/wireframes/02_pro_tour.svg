<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Inter, Arial, sans-serif">
  <style>
    .card { fill:#fff; stroke:#cfd6dd; stroke-width:1; }
    .ph { fill:#e7ecf0; stroke:#cfd6dd; }
    .label { font-size:11px; fill:#7b8694; letter-spacing:0.3px; }
    .title { font-size:14px; font-weight:600; fill:#2a3340; }
    .sub { font-size:12px; fill:#6b7280; }
    .nav { font-size:13px; fill:#374151; }
    .ann { font-size:10px; fill:#9aa3ad; font-style:italic; }
    .row { font-size:12px; fill:#374151; }
  </style>
  <rect width="1280" height="800" fill="#f6f8fa"/>
  <!-- Top nav (same as Home) -->
  <rect x="0" y="0" width="1280" height="64" fill="#ffffff" stroke="#e1e5ea"/>
  <text x="32" y="40" class="title" font-size="18">PadelLens</text>
  <g class="nav">
    <text x="260" y="40">Home</text>
    <text x="320" y="40" font-weight="600" fill="#0ea5e9">Pro Tour</text>
    <text x="395" y="40">My Stats</text>
    <text x="470" y="40">Log a Match</text>
    <text x="565" y="40">Compare</text>
  </g>
  <!-- Left filter sidebar -->
  <rect x="32" y="96" width="240" height="672" rx="10" class="card"/>
  <text x="56" y="124" class="label">FILTERS</text>
  <text x="56" y="156" class="title">Country</text>
  <rect x="56" y="166" width="192" height="32" rx="6" class="ph"/>
  <text x="68" y="186" class="sub">All countries ⌄</text>
  <text x="56" y="226" class="title">Surface</text>
  <rect x="56" y="236" width="92" height="28" rx="14" fill="#0ea5e9"/>
  <text x="102" y="254" fill="#fff" font-size="11" text-anchor="middle">Indoor</text>
  <rect x="156" y="236" width="92" height="28" rx="14" class="ph"/>
  <text x="202" y="254" class="sub" text-anchor="middle">Outdoor</text>
  <text x="56" y="296" class="title">Tournament category</text>
  <g transform="translate(56,308)" class="sub">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#0ea5e9"/>      <text x="22" y="12">Major</text>
    <rect x="0" y="24" width="14" height="14" rx="3" fill="#0ea5e9"/>     <text x="22" y="36">P1</text>
    <rect x="0" y="48" width="14" height="14" rx="3" class="ph"/>         <text x="22" y="60">P2</text>
    <rect x="0" y="72" width="14" height="14" rx="3" fill="#0ea5e9"/>     <text x="22" y="84">Finals</text>
  </g>
  <text x="56" y="416" class="title">Date range</text>
  <rect x="56" y="426" width="192" height="32" rx="6" class="ph"/>
  <text x="68" y="446" class="sub">Last 6 months ⌄</text>
  <rect x="56" y="488" width="192" height="36" rx="6" fill="#0ea5e9"/>
  <text x="152" y="510" fill="#fff" font-size="12" text-anchor="middle" font-weight="600">Apply filters</text>
  <text x="56" y="546" fill="#0ea5e9" font-size="11">Reset</text>
  <text x="56" y="746" class="ann">Always-visible filters — supports recognition over recall (Nielsen #6).</text>
  <!-- Main: tabs + table -->
  <g transform="translate(290,96)">
    <text x="0" y="20" class="label">PREMIER PADEL · MEN'S</text>
    <!-- Tabs -->
    <g transform="translate(0,36)">
      <rect x="0" y="0" width="120" height="36" rx="6" fill="#0ea5e9"/>
      <text x="60" y="22" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">Rankings</text>
      <rect x="128" y="0" width="120" height="36" rx="6" class="card"/>
      <text x="188" y="22" class="sub" text-anchor="middle">Matches</text>
      <rect x="256" y="0" width="120" height="36" rx="6" class="card"/>
      <text x="316" y="22" class="sub" text-anchor="middle">Surface effect</text>
    </g>
    <!-- Ranking table -->
    <rect x="0" y="84" width="952" height="600" rx="10" class="card"/>
    <g transform="translate(20,108)" class="label">
      <text x="0" y="10">#</text>
      <text x="60" y="10">PLAYER</text>
      <text x="290" y="10">COUNTRY</text>
      <text x="400" y="10">SIDE</text>
      <text x="480" y="10">POINTS</text>
      <text x="600" y="10">FORM (LAST 10)</text>
      <text x="820" y="10">→</text>
    </g>
    <line x1="20" y1="126" x2="932" y2="126" stroke="#e1e5ea"/>
    <g transform="translate(20,148)" class="row">
      <!-- 8 rows -->
      <text x="0" y="14">1</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14" font-weight="600">Arturo Coello</text>
      <text x="290" y="14">ESP 🇪🇸</text>
      <text x="400" y="14">Drive</text>
      <text x="480" y="14">11,200</text>
      <polyline points="600,16 615,10 630,12 645,8 660,12 675,6 690,10 705,4 720,8 735,2" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    </g>
    <g transform="translate(20,178)" class="row">
      <text x="0" y="14">2</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14" font-weight="600">Agustin Tapia</text>
      <text x="290" y="14">ARG 🇦🇷</text>
      <text x="400" y="14">Reves</text>
      <text x="480" y="14">11,050</text>
      <polyline points="600,14 615,8 630,12 645,6 660,10 675,8 690,4 705,8 720,6 735,4" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    </g>
    <g transform="translate(20,208)" class="row">
      <text x="0" y="14">3</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14" font-weight="600">Ale Galan</text>
      <text x="290" y="14">ESP 🇪🇸</text>
      <text x="400" y="14">Drive</text>
      <text x="480" y="14">9,300</text>
      <polyline points="600,12 615,14 630,10 645,12 660,8 675,10 690,12 705,8 720,12 735,10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    </g>
    <g transform="translate(20,238)" class="row">
      <text x="0" y="14">4</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14" font-weight="600">Federico Chingotto</text>
      <text x="290" y="14">ARG 🇦🇷</text>
      <text x="400" y="14">Reves</text>
      <text x="480" y="14">9,180</text>
      <polyline points="600,14 615,10 630,12 645,8 660,14 675,10 690,12 705,8 720,10 735,8" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    </g>
    <g transform="translate(20,268)" class="row" opacity="0.85">
      <text x="0" y="14">5</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14">Juan Lebron</text>
      <text x="290" y="14">ESP</text>
      <text x="400" y="14">Reves</text>
      <text x="480" y="14">7,600</text>
    </g>
    <g transform="translate(20,298)" class="row" opacity="0.7">
      <text x="0" y="14">6</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14">Franco Stupaczuk</text>
      <text x="290" y="14">ARG</text>
      <text x="400" y="14">Drive</text>
      <text x="480" y="14">7,480</text>
    </g>
    <g transform="translate(20,328)" class="row" opacity="0.55">
      <text x="0" y="14">7</text>
      <rect x="40" y="0" width="22" height="22" rx="11" class="ph"/>
      <text x="70" y="14">Martin Di Nenno</text>
      <text x="290" y="14">ARG</text>
      <text x="400" y="14">Reves</text>
      <text x="480" y="14">6,750</text>
    </g>
    <g transform="translate(20,358)" class="row" opacity="0.4">
      <text x="0" y="14">8</text>
      <text x="70" y="14">Paquito Navarro</text>
      <text x="290" y="14">ESP</text>
      <text x="400" y="14">Reves</text>
      <text x="480" y="14">6,400</text>
    </g>
    <text x="476" y="560" class="ann" text-anchor="middle">[ 22 more rows · scroll ]</text>
    <text x="20" y="650" class="ann">Editorial focus: focused on rank + form, not raw points. Form sparkline gives momentum.</text>
  </g>
  <!-- Caption -->
  <text x="32" y="790" class="ann">Wireframe 2 of 5 — Pro Tour Explorer (rankings view)</text>
</svg>
