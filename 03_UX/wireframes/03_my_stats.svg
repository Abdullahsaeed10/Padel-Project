<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Inter, Arial, sans-serif">
  <style>
    .card { fill:#fff; stroke:#cfd6dd; stroke-width:1; }
    .ph { fill:#e7ecf0; stroke:#cfd6dd; }
    .label { font-size:11px; fill:#7b8694; letter-spacing:0.3px; }
    .title { font-size:14px; font-weight:600; fill:#2a3340; }
    .sub { font-size:12px; fill:#6b7280; }
    .nav { font-size:13px; fill:#374151; }
    .ann { font-size:10px; fill:#9aa3ad; font-style:italic; }
    .kpi { font-size:32px; font-weight:700; fill:#1f2937; }
  </style>
  <rect width="1280" height="800" fill="#f6f8fa"/>
  <rect x="0" y="0" width="1280" height="64" fill="#ffffff" stroke="#e1e5ea"/>
  <text x="32" y="40" class="title" font-size="18">PadelLens</text>
  <g class="nav">
    <text x="260" y="40">Home</text>
    <text x="320" y="40">Pro Tour</text>
    <text x="395" y="40" font-weight="600" fill="#0ea5e9">My Stats</text>
    <text x="470" y="40">Log a Match</text>
    <text x="565" y="40">Compare</text>
  </g>
  <!-- KPI row -->
  <g transform="translate(32,96)">
    <rect width="280" height="100" rx="10" class="card"/>
    <text x="20" y="28" class="label">TOTAL MATCHES</text>
    <text x="20" y="70" class="kpi">40</text>
    <text x="20" y="90" class="sub">since Nov 2024 · 4 partners · 4 clubs</text>
  </g>
  <g transform="translate(326,96)">
    <rect width="280" height="100" rx="10" class="card"/>
    <text x="20" y="28" class="label">WIN RATE</text>
    <text x="20" y="70" class="kpi">55%</text>
    <text x="20" y="90" class="sub">22 W · 18 L</text>
  </g>
  <g transform="translate(620,96)">
    <rect width="280" height="100" rx="10" class="card"/>
    <text x="20" y="28" class="label">3-SET FADE</text>
    <text x="20" y="70" class="kpi" fill="#ef4444">40%</text>
    <text x="20" y="90" class="sub">vs 80% in 2-set matches · −40 pp</text>
  </g>
  <g transform="translate(914,96)">
    <rect width="334" height="100" rx="10" class="card"/>
    <text x="20" y="28" class="label">CURRENT FORM</text>
    <text x="20" y="70" class="kpi">W W W L W</text>
    <text x="20" y="90" class="sub">last 5 matches · streak: 2 W</text>
  </g>
  <!-- 4 chart grid -->
  <g transform="translate(32,216)">
    <rect width="606" height="270" rx="10" class="card"/>
    <text x="20" y="28" class="label">WIN-RATE TREND</text>
    <text x="20" y="48" class="title">Rolling 5-match win rate over time</text>
    <!-- chart area -->
    <g transform="translate(40,80)">
      <line x1="0" y1="160" x2="540" y2="160" stroke="#cfd6dd"/>
      <line x1="0" y1="80" x2="540" y2="80" stroke="#eef0f3" stroke-dasharray="2,3"/>
      <text x="-10" y="84" class="sub" text-anchor="end">50%</text>
      <text x="-10" y="164" class="sub" text-anchor="end">0%</text>
      <polyline points="0,120 60,100 120,90 180,70 240,60 300,55 360,75 420,45 480,40 540,30" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
      <polyline points="0,120 60,100 120,90 180,70 240,60 300,55 360,75 420,45 480,40 540,30 540,160 0,160" fill="#0ea5e9" opacity="0.1" stroke="none"/>
      <text x="540" y="22" class="sub" text-anchor="end">latest 5: 80%</text>
      <text x="0" y="184" class="ann">Nov</text>
      <text x="270" y="184" class="ann" text-anchor="middle">Jan</text>
      <text x="540" y="184" class="ann" text-anchor="end">Apr</text>
    </g>
  </g>
  <g transform="translate(652,216)">
    <rect width="596" height="270" rx="10" class="card"/>
    <text x="20" y="28" class="label">PARTNER EFFECT</text>
    <text x="20" y="48" class="title">Win rate by partner</text>
    <g transform="translate(110,80)">
      <text x="-10" y="14" class="sub" text-anchor="end">Luca</text>
      <rect x="0" y="3" width="332" height="14" fill="#0ea5e9"/>
      <text x="340" y="14" class="sub">80% (8/10)</text>
      <text x="-10" y="40" class="sub" text-anchor="end">Marco V.</text>
      <rect x="0" y="29" width="236" height="14" fill="#0ea5e9" opacity="0.65"/>
      <text x="244" y="40" class="sub">57% (4/7)</text>
      <text x="-10" y="66" class="sub" text-anchor="end">Andrea</text>
      <rect x="0" y="55" width="208" height="14" fill="#0ea5e9" opacity="0.5"/>
      <text x="216" y="66" class="sub">50% (3/6)</text>
      <text x="-10" y="92" class="sub" text-anchor="end">Giulia</text>
      <rect x="0" y="81" width="208" height="14" fill="#0ea5e9" opacity="0.5"/>
      <text x="216" y="92" class="sub">50% (3/6)</text>
      <text x="-10" y="118" class="sub" text-anchor="end">Stefano</text>
      <rect x="0" y="107" width="208" height="14" fill="#0ea5e9" opacity="0.5"/>
      <text x="216" y="118" class="sub">50% (3/6)</text>
      <text x="-10" y="144" class="sub" text-anchor="end">Davide</text>
      <rect x="0" y="133" width="83" height="14" fill="#ef4444" opacity="0.7"/>
      <text x="91" y="144" class="sub">20% (1/5)</text>
    </g>
    <text x="20" y="252" class="ann">Annotation: Luca highlighted as the strongest pairing (editorial focus).</text>
  </g>
  <g transform="translate(32,506)">
    <rect width="606" height="262" rx="10" class="card"/>
    <text x="20" y="28" class="label">SHOT DNA</text>
    <text x="20" y="48" class="title">Winners (right) vs errors (left) — diverging bars</text>
    <g transform="translate(303,80)">
      <line x1="0" y1="0" x2="0" y2="160" stroke="#7b8694"/>
      <text x="0" y="-6" class="sub" text-anchor="middle">0</text>
      <text x="-10" y="20" class="sub" text-anchor="end">Bandeja</text>
      <rect x="0" y="10" width="160" height="14" fill="#0ea5e9"/>
      <text x="-10" y="50" class="sub" text-anchor="end">Volley</text>
      <rect x="0" y="40" width="80" height="14" fill="#0ea5e9"/>
      <text x="-10" y="80" class="sub" text-anchor="end">Forehand</text>
      <rect x="0" y="70" width="55" height="14" fill="#0ea5e9"/>
      <text x="-10" y="110" class="sub" text-anchor="end">Backhand</text>
      <rect x="-120" y="100" width="120" height="14" fill="#ef4444"/>
      <text x="-10" y="140" class="sub" text-anchor="end">Smash</text>
      <rect x="-155" y="130" width="155" height="14" fill="#ef4444"/>
      <text x="-160" y="158" class="ann">errors</text>
      <text x="160" y="158" class="ann" text-anchor="end">winners</text>
    </g>
  </g>
  <g transform="translate(652,506)">
    <rect width="596" height="262" rx="10" class="card"/>
    <text x="20" y="28" class="label">SET-BY-SET FATIGUE</text>
    <text x="20" y="48" class="title">Win rate when the match goes to a third set</text>
    <g transform="translate(60,90)">
      <!-- 2 columns -->
      <rect x="40" y="20" width="120" height="120" fill="#0ea5e9"/>
      <text x="100" y="160" class="sub" text-anchor="middle">2-set matches</text>
      <text x="100" y="14" class="title" text-anchor="middle">80%</text>
      <rect x="320" y="80" width="120" height="60" fill="#ef4444" opacity="0.85"/>
      <text x="380" y="160" class="sub" text-anchor="middle">3-set matches</text>
      <text x="380" y="74" class="title" text-anchor="middle">40%</text>
      <text x="240" y="100" class="ann" text-anchor="middle">−40 pp</text>
      <line x1="170" y1="38" x2="310" y2="98" stroke="#7b8694" stroke-dasharray="3,3"/>
    </g>
    <text x="20" y="244" class="ann">Annotation guides the user: drop is the editorial focus, not raw counts.</text>
  </g>
  <text x="32" y="790" class="ann">Wireframe 3 of 5 — My Stats (personal analytics dashboard)</text>
</svg>
