<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Inter, Arial, sans-serif">
  <style>
    .card { fill:#fff; stroke:#cfd6dd; stroke-width:1; }
    .ph { fill:#e7ecf0; stroke:#cfd6dd; }
    .label { font-size:11px; fill:#7b8694; letter-spacing:0.3px; }
    .title { font-size:14px; font-weight:600; fill:#2a3340; }
    .kpi { font-size:42px; font-weight:700; fill:#1f2937; }
    .sub { font-size:12px; fill:#6b7280; }
    .nav { font-size:13px; fill:#374151; }
    .ann { font-size:10px; fill:#9aa3ad; font-style:italic; }
    .accent { fill:#0ea5e9; }
  </style>
  <rect width="1280" height="800" fill="#f6f8fa"/>
  <!-- Top nav -->
  <rect x="0" y="0" width="1280" height="64" fill="#ffffff" stroke="#e1e5ea"/>
  <text x="32" y="40" class="title" font-size="18">PadelLens</text>
  <g class="nav">
    <text x="260" y="40" font-weight="600" fill="#0ea5e9">Home</text>
    <text x="320" y="40">Pro Tour</text>
    <text x="395" y="40">My Stats</text>
    <text x="470" y="40">Log a Match</text>
    <text x="565" y="40">Compare</text>
  </g>
  <rect x="1170" y="20" width="80" height="28" rx="14" class="card"/>
  <text x="1184" y="38" class="sub">Marco</text>
  <text x="1240" y="38" class="sub" text-anchor="end">⌄</text>
  <!-- Hero -->
  <rect x="32" y="96" width="780" height="170" rx="10" class="card"/>
  <text x="56" y="128" class="label">YOUR LAST 10 MATCHES</text>
  <text x="56" y="200" class="kpi">7-3</text>
  <text x="56" y="226" class="sub">70% win rate · ↑ 12% vs previous 10</text>
  <!-- mini sparkline -->
  <polyline points="320,220 360,206 400,212 440,196 480,208 520,184 560,190 600,170 640,180 680,160" fill="none" stroke="#0ea5e9" stroke-width="2.5"/>
  <circle cx="680" cy="160" r="5" fill="#0ea5e9"/>
  <text x="700" y="164" class="sub">latest</text>
  <text x="60" y="252" class="ann">Editorial focus: the one number the user opens the app to see.</text>
  <!-- Right card: pro headline -->
  <rect x="828" y="96" width="420" height="170" rx="10" class="card"/>
  <text x="852" y="128" class="label">PRO TOUR · TODAY</text>
  <rect x="852" y="142" width="56" height="56" rx="28" class="ph"/>
  <text x="924" y="170" class="title">Coello / Tapia</text>
  <text x="924" y="190" class="sub">World #1 · Riyadh P1 quarter-final today 19:30</text>
  <rect x="852" y="218" width="120" height="32" rx="6" fill="#0ea5e9"/>
  <text x="912" y="238" fill="#fff" font-size="12" text-anchor="middle">View matchup</text>
  <!-- Row 2: 3 cards -->
  <rect x="32" y="290" width="395" height="220" rx="10" class="card"/>
  <text x="56" y="320" class="label">PARTNER EFFECT</text>
  <text x="56" y="342" class="title">You win 80% with Luca · 20% with Davide</text>
  <!-- mini bars -->
  <g transform="translate(56,360)">
    <text x="0" y="14" class="sub">Luca</text>      <rect x="80" y="3" width="220" height="14" fill="#0ea5e9"/>     <text x="310" y="14" class="sub">80%</text>
    <text x="0" y="36" class="sub">Marco V.</text>  <rect x="80" y="25" width="155" height="14" fill="#0ea5e9" opacity="0.7"/><text x="245" y="36" class="sub">57%</text>
    <text x="0" y="58" class="sub">Andrea</text>    <rect x="80" y="47" width="135" height="14" fill="#0ea5e9" opacity="0.55"/><text x="225" y="58" class="sub">50%</text>
    <text x="0" y="80" class="sub">Stefano</text>   <rect x="80" y="69" width="135" height="14" fill="#0ea5e9" opacity="0.55"/><text x="225" y="80" class="sub">50%</text>
    <text x="0" y="102" class="sub">Davide</text>   <rect x="80" y="91" width="55" height="14" fill="#ef4444" opacity="0.7"/><text x="145" y="102" class="sub">20%</text>
  </g>
  <rect x="443" y="290" width="395" height="220" rx="10" class="card"/>
  <text x="467" y="320" class="label">SHOT DNA · LAST 30 MATCHES</text>
  <text x="467" y="342" class="title">Bandeja is your weapon · smash bleeds points</text>
  <!-- diverging bars -->
  <g transform="translate(467,360)">
    <line x1="170" y1="0" x2="170" y2="120" stroke="#cfd6dd"/>
    <text x="0" y="14" class="sub">Bandeja</text>     <rect x="170" y="3" width="160" height="12" fill="#0ea5e9"/>
    <text x="0" y="34" class="sub">Volley</text>      <rect x="170" y="23" width="80" height="12" fill="#0ea5e9"/>
    <text x="0" y="54" class="sub">Forehand</text>    <rect x="170" y="43" width="55" height="12" fill="#0ea5e9"/>
    <text x="0" y="74" class="sub">Backhand</text>    <rect x="55" y="63" width="115" height="12" fill="#ef4444"/>
    <text x="0" y="94" class="sub">Smash</text>       <rect x="20" y="83" width="150" height="12" fill="#ef4444"/>
    <text x="170" y="118" class="ann" text-anchor="middle">winners − errors</text>
  </g>
  <rect x="854" y="290" width="394" height="220" rx="10" class="card"/>
  <text x="878" y="320" class="label">RECOMMENDED THIS WEEK</text>
  <text x="878" y="348" class="title">Drill: defensive smash from glass</text>
  <text x="878" y="370" class="sub">You lose 8 points/match on smashes, vs 2 with the bandeja.</text>
  <rect x="878" y="392" width="346" height="100" rx="6" class="ph"/>
  <text x="1051" y="446" class="sub" text-anchor="middle">[ training tip illustration ]</text>
  <!-- Bottom: log button + recent activity -->
  <rect x="32" y="534" width="780" height="234" rx="10" class="card"/>
  <text x="56" y="564" class="label">RECENT MATCHES</text>
  <g transform="translate(56,580)" class="sub">
    <text y="20">Apr 28 · vs Federico &amp; Tommaso · W 6-3 6-4 · with Luca</text>
    <text y="42">Apr 24 · vs Sara &amp; Elena · L 4-6 3-6 · with Davide</text>
    <text y="64">Apr 21 · vs Giorgio &amp; Pietro · W 7-5 6-3 · with Luca</text>
    <text y="86">Apr 18 · vs Lorenzo &amp; Nicolo · L 6-4 3-6 5-7 · with Andrea</text>
    <text y="108">Apr 15 · vs Paolo &amp; Matteo · W 6-2 6-1 · with Stefano</text>
  </g>
  <text x="56" y="744" fill="#0ea5e9" font-size="12">See all 40 matches →</text>
  <rect x="828" y="534" width="420" height="234" rx="10" class="card"/>
  <text x="852" y="564" class="label">QUICK ACTION</text>
  <text x="852" y="592" class="title">Just played? Log it in 90 seconds.</text>
  <rect x="852" y="620" width="372" height="44" rx="8" fill="#0ea5e9"/>
  <text x="1038" y="648" fill="#fff" font-size="14" text-anchor="middle" font-weight="600">+ Log a new match</text>
  <text x="852" y="694" class="ann">Friction killer: one button, always visible above the fold.</text>
  <!-- Caption -->
  <text x="32" y="790" class="ann">Wireframe 1 of 5 — Home (logged-in landing page)</text>
</svg>
